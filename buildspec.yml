version: 0.2

env:
  shell: bash

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm --prefix frontend ci --no-audit --no-fund

  pre_build:
    commands:
      - npm --prefix frontend run lint
      - npm --prefix frontend run typecheck

  build:
    commands:
      - find scripts -name "*.sh" -exec chmod 755 {} \; 2>/dev/null || true
      - rm -rf deploy && mkdir -p deploy
      - tar -czf /tmp/deploy.tgz --exclude='*/node_modules' --exclude='node_modules' --exclude='.git' --exclude='.env' --exclude='data/backups' --exclude='data/logs' --exclude='deploy' .
      - tar -xzf /tmp/deploy.tgz -C deploy
      - rm /tmp/deploy.tgz

artifacts:
  base-directory: deploy
  files:
    - '**/*'

cache:
  paths:
    - frontend/node_modules/**/*
    - /root/.npm/**/*
