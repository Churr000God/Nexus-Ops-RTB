version: 0.0
os: linux

files:
  - source: /
    destination: /home/ec2-user/nexus-ops-rtb

permissions:
  - object: /home/ec2-user/nexus-ops-rtb/scripts
    pattern: '**/*.sh'
    owner: ec2-user
    group: ec2-user
    type:
      - file
    mode: '755'

hooks:
  BeforeInstall:
    - location: scripts/codedeploy/before_install.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/codedeploy/after_install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/codedeploy/application_start.sh
      timeout: 600
      runas: root

  ValidateService:
    - location: scripts/codedeploy/validate_service.sh
      timeout: 120
      runas: root
